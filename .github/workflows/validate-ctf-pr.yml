name: Validate CTF challenge PR

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run validator
        id: validator
        run: |
          python .github/scripts/validate_ctf_pr.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --report-path validation_report.md

      - name: Upload validation report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctf-validation-report
          path: validation_report.md

      - name: Create or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          REPORT_PATH: validation_report.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- ctf-validator-report -->';
            const body = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const previous = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
